<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome To Website</title>
<style>
    *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#0f172a,#1e3a8a,#7e22ce);
    display:flex;
    flex-direction:column;
}

/* NAVBAR */

.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 8%;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
    border-bottom:1px solid rgba(255,255,255,0.1);
}

.navbar h1{
    color:white;
    font-size:2rem;
}

.nav-links{
    display:flex;
    gap:30px;
}

.nav-links a{
    color:white;
    text-decoration:none;
    font-size:1.1rem;
    transition:0.3s;
}

.nav-links a:hover{
    color:#38bdf8;
}

/* IMAGE SECTION */

.hero{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px;
}

.hero img{
    width:90%;
    max-width:1100px;
    border-radius:25px;
    box-shadow:0 10px 40px rgba(0,0,0,0.4);
    transition:0.4s;
}

.hero img:hover{
    transform:scale(1.02);
}

/* FOOTER */

footer{
    text-align:center;
    color:white;
    padding:25px;
    background:rgba(0,0,0,0.2);
    border-top:1px solid rgba(255,255,255,0.1);
}

footer p{
    margin:5px 0;
}
</style>
</head>
<body>

    <nav class="navbar">
        <h1>Coders</h1>

        <div class="nav-links">
            <a href="lessons.html">Lessons</a>
            <a href="projects.html">Projects</a>
        </div>
    </nav>

    <section class="hero">
        <img src="ChatGPT Image Jun 8, 2026, 10_55_18 AM.png" alt="Welcome To Coders">
    </section>

    <footer>
        <p>Enjoy Learning Programming Languages And Building Amazing Projects.</p>
        <p>&copy; 2026 Coders. All Rights Reserved.</p>
    </footer>

</body>
</html>
