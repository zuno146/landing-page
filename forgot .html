<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forgot Password</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}


body{

    min-height:100vh;
    background:linear-gradient(135deg,#2563eb,#1e40af,#7e22ce);

    display:flex;
    justify-content:center;
    align-items:center;

}


/* Box */

.message-box{

    width:420px;
    background:white;

    padding:40px;

    border-radius:20px;

    text-align:center;

    box-shadow:0 15px 40px rgba(0,0,0,0.3);

}


/* Logo */

.message-box h1{

    color:#2563eb;
    font-size:40px;
    margin-bottom:20px;

}


/* Text */

.message-box p{

    color:#555;
    font-size:18px;
    margin-bottom:30px;

    line-height:1.6;

}



</style>

</head>


<body>


<div class="message-box">


<h1>Coders</h1>


<p>
Sorry 😔 We don't have a password recovery solution yet.
Please create a new account to login.
</p>





</div>


</body>
</html>
